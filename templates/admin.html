<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Forge — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-deep:#f5f4fc;--bg-mid:#ffffff;--bg-card:#ffffff;--bg-input:#faf9fe;--accent:#7c3aed;--accent2:#ec4899;--text:#2c2640;--text-dim:#74708a;--text-bright:#191329;--border:rgba(40,20,80,0.09);--border-light:rgba(40,20,80,0.14);--success:#10b981;--error:#ef4444;--panel:#ffffff;--accent-soft:rgba(124,58,237,.10)}
body{background:var(--bg-deep);color:var(--text);font-family:'DM Sans',sans-serif;padding:24px;min-height:100vh;position:relative;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(680px 460px at 8% -6%,rgba(124,58,237,.16),transparent 60%),radial-gradient(620px 460px at 102% 2%,rgba(236,72,153,.15),transparent 58%)}
.container{max-width:880px;margin:0 auto;position:relative;z-index:1}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(120deg,#7c3aed,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.header a{color:var(--text-dim);text-decoration:none;font-size:13px;padding:9px 16px;border:1px solid var(--border-light);border-radius:999px;background:#fff;box-shadow:0 4px 14px rgba(80,40,160,.08);transition:all .18s}.header a:hover{color:var(--accent);border-color:rgba(124,58,237,.4);background:var(--accent-soft)}
.card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:22px;box-shadow:0 14px 36px rgba(80,40,160,.10)}
.card h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text-bright)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--text-dim);letter-spacing:1px;padding:9px 12px;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:14px}
.role-admin{color:var(--accent);font-weight:700}.role-user{color:var(--text-dim)}
.btn{padding:8px 18px;border-radius:999px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s}
.btn-danger{background:rgba(239,68,68,0.10);color:var(--error);border:1px solid rgba(239,68,68,0.30)}.btn-danger:hover{background:rgba(239,68,68,0.18)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 20px rgba(124,58,237,.34)}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(124,58,237,.45)}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.form-group label{font-size:12px;color:var(--text-dim);font-weight:600}
.form-group input,.form-group select{padding:10px 14px;border-radius:12px;border:1px solid var(--border-light);background:#fff;color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;box-shadow:0 14px 36px rgba(80,40,160,.18)}
.toast.show{opacity:1}.toast-ok{background:#ecfdf5;color:#047857;border:1px solid rgba(16,185,129,.4)}.toast-err{background:#fef2f2;color:#b91c1c;border:1px solid rgba(239,68,68,.4)}
.empty{text-align:center;color:var(--text-dim);padding:20px;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Admin Panel</h1>
    <a href="/">Back to Agent Forge</a>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Add User -->
  <div class="card">
    <h2>Add New User</h2>
    <div class="form-row">
      <div class="form-group"><label>Username</label><input type="text" id="new-username" placeholder="johndoe"></div>
      <div class="form-group"><label>Display Name</label><input type="text" id="new-name" placeholder="John Doe"></div>
      <div class="form-group"><label>Password</label><input type="password" id="new-password" placeholder="minimum 4 chars"></div>
      <div class="form-group"><label>Role</label><select id="new-role"><option value="user">User</option><option value="admin">Admin</option></select></div>
      <button class="btn btn-primary" onclick="addUser()">Add User</button>
    </div>
  </div>

  <!-- User List -->
  <div class="card">
    <h2>Users</h2>
    <table>
      <thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Created</th><th></th></tr></thead>
      <tbody id="user-list"></tbody>
    </table>
  </div>

  <!-- Activity Log -->
  <div class="card">
    <h2>Recent Activity</h2>
    <div id="activity-log" class="empty">Loading...</div>
  </div>
</div>

<script>
function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'toast-ok' : 'toast-err');
  setTimeout(() => t.className = 'toast', 3000);
}

async function loadUsers() {
  const r = await fetch('/api/admin/users');
  if (!r.ok) { window.location.href = '/'; return; }
  const users = await r.json();
  const tbody = document.getElementById('user-list');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td>${u.name}</td>
      <td><span class="role-${u.role}">${u.role}</span></td>
      <td style="color:var(--text-dim);font-size:12px">${u.created ? u.created.split('T')[0] : ''}</td>
      <td>${u.username === 'admin' ? '' : `<button class="btn btn-danger" onclick="deleteUser('${u.username}')">Delete</button>`}</td>
    </tr>
  `).join('');
}

async function addUser() {
  const username = document.getElementById('new-username').value.trim();
  const name = document.getElementById('new-name').value.trim();
  const password = document.getElementById('new-password').value;
  const role = document.getElementById('new-role').value;
  if (!username || !password) { showToast('Username and password required', false); return; }
  const r = await fetch('/api/admin/users', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username, name, password, role})
  });
  const d = await r.json();
  showToast(d.message, r.ok);
  if (r.ok) {
    document.getElementById('new-username').value = '';
    document.getElementById('new-name').value = '';
    document.getElementById('new-password').value = '';
    loadUsers();
  }
}

async function deleteUser(username) {
  if (!confirm(`Delete user "${username}"?`)) return;
  const r = await fetch(`/api/admin/users/${username}`, {method: 'DELETE'});
  const d = await r.json();
  showToast(d.message, r.ok);
  loadUsers();
}

async function loadActivity() {
  const r = await fetch('/api/admin/activity');
  if (!r.ok) return;
  const lines = await r.json();
  const el = document.getElementById('activity-log');
  if (!lines.length) { el.innerHTML = '<div class="empty">No activity yet</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Project</th><th>Query</th></tr></thead><tbody>' +
    lines.reverse().map(l => `<tr>
      <td style="font-size:12px;color:var(--text-dim);white-space:nowrap">${l.ts ? l.ts.replace('T',' ').split('.')[0] : ''}</td>
      <td><strong>${l.user||''}</strong></td>
      <td>${l.action||''}</td>
      <td style="font-size:12px;font-family:'IBM Plex Mono',monospace">${l.project_id||''}</td>
      <td style="font-size:12px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.query||''}</td>
    </tr>`).join('') + '</tbody></table>';
}

loadUsers();
loadActivity();
</script>
</body>
</html>
