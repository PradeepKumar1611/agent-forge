<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Forge — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-deep:#080910;--bg-mid:#0d0f17;--bg-card:#15172a;--bg-input:#171a28;--accent:#5b8cff;--accent2:#a78bfa;--text:#dbe2f0;--text-dim:#8a93ab;--text-bright:#f4f7fc;--border:rgba(255,255,255,0.07);--border-light:rgba(255,255,255,0.12);--success:#34d399;--error:#fb7185;--panel:rgba(255,255,255,0.045);--accent-soft:rgba(91,140,255,.15)}
body{background:var(--bg-deep);color:var(--text);font-family:'DM Sans',sans-serif;padding:24px;min-height:100vh;position:relative;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(820px 520px at 12% -8%,rgba(91,140,255,.18),transparent 60%),radial-gradient(760px 520px at 100% 4%,rgba(167,139,250,.15),transparent 55%)}
.container{max-width:860px;margin:0 auto;position:relative;z-index:1}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(120deg,#dce8ff,#c9b8ff 55%,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.header a{color:var(--text-dim);text-decoration:none;font-size:13px;padding:8px 14px;border:1px solid var(--border-light);border-radius:10px;background:var(--panel);transition:all .18s}.header a:hover{color:var(--text-bright);border-color:rgba(91,140,255,.45);background:var(--accent-soft)}
.card{background:rgba(21,23,42,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border-light);border-radius:16px;padding:24px;margin-bottom:22px;box-shadow:0 10px 34px rgba(0,0,0,.4)}
.card h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text-bright)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--text-dim);letter-spacing:1px;padding:9px 12px;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:14px}
.role-admin{color:var(--accent);font-weight:700}.role-user{color:var(--text-dim)}
.btn{padding:7px 15px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s}
.btn-danger{background:rgba(251,113,133,0.12);color:var(--error);border:1px solid rgba(251,113,133,0.32)}.btn-danger:hover{background:rgba(251,113,133,0.22)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 16px rgba(91,140,255,.4)}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 9px 22px rgba(91,140,255,.55)}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.form-group label{font-size:12px;color:var(--text-dim)}
.form-group input,.form-group select{padding:8px 12px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif}
.form-group input:focus{outline:none;border-color:var(--accent)}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}.toast-ok{background:#065f46;color:var(--success);border:1px solid var(--success)}.toast-err{background:#7f1d1d;color:var(--error);border:1px solid var(--error)}
.empty{text-align:center;color:var(--text-dim);padding:20px;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Admin Panel</h1>
    <a href="/">Back to Agent Forge</a>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Add User -->
  <div class="card">
    <h2>Add New User</h2>
    <div class="form-row">
      <div class="form-group"><label>Username</label><input type="text" id="new-username" placeholder="johndoe"></div>
      <div class="form-group"><label>Display Name</label><input type="text" id="new-name" placeholder="John Doe"></div>
      <div class="form-group"><label>Password</label><input type="password" id="new-password" placeholder="minimum 4 chars"></div>
      <div class="form-group"><label>Role</label><select id="new-role"><option value="user">User</option><option value="admin">Admin</option></select></div>
      <button class="btn btn-primary" onclick="addUser()">Add User</button>
    </div>
  </div>

  <!-- User List -->
  <div class="card">
    <h2>Users</h2>
    <table>
      <thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Created</th><th></th></tr></thead>
      <tbody id="user-list"></tbody>
    </table>
  </div>

  <!-- Activity Log -->
  <div class="card">
    <h2>Recent Activity</h2>
    <div id="activity-log" class="empty">Loading...</div>
  </div>
</div>

<script>
function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'toast-ok' : 'toast-err');
  setTimeout(() => t.className = 'toast', 3000);
}

async function loadUsers() {
  const r = await fetch('/api/admin/users');
  if (!r.ok) { window.location.href = '/'; return; }
  const users = await r.json();
  const tbody = document.getElementById('user-list');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td>${u.name}</td>
      <td><span class="role-${u.role}">${u.role}</span></td>
      <td style="color:var(--text-dim);font-size:12px">${u.created ? u.created.split('T')[0] : ''}</td>
      <td>${u.username === 'admin' ? '' : `<button class="btn btn-danger" onclick="deleteUser('${u.username}')">Delete</button>`}</td>
    </tr>
  `).join('');
}

async function addUser() {
  const username = document.getElementById('new-username').value.trim();
  const name = document.getElementById('new-name').value.trim();
  const password = document.getElementById('new-password').value;
  const role = document.getElementById('new-role').value;
  if (!username || !password) { showToast('Username and password required', false); return; }
  const r = await fetch('/api/admin/users', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username, name, password, role})
  });
  const d = await r.json();
  showToast(d.message, r.ok);
  if (r.ok) {
    document.getElementById('new-username').value = '';
    document.getElementById('new-name').value = '';
    document.getElementById('new-password').value = '';
    loadUsers();
  }
}

async function deleteUser(username) {
  if (!confirm(`Delete user "${username}"?`)) return;
  const r = await fetch(`/api/admin/users/${username}`, {method: 'DELETE'});
  const d = await r.json();
  showToast(d.message, r.ok);
  loadUsers();
}

async function loadActivity() {
  const r = await fetch('/api/admin/activity');
  if (!r.ok) return;
  const lines = await r.json();
  const el = document.getElementById('activity-log');
  if (!lines.length) { el.innerHTML = '<div class="empty">No activity yet</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Project</th><th>Query</th></tr></thead><tbody>' +
    lines.reverse().map(l => `<tr>
      <td style="font-size:12px;color:var(--text-dim);white-space:nowrap">${l.ts ? l.ts.replace('T',' ').split('.')[0] : ''}</td>
      <td><strong>${l.user||''}</strong></td>
      <td>${l.action||''}</td>
      <td style="font-size:12px;font-family:'IBM Plex Mono',monospace">${l.project_id||''}</td>
      <td style="font-size:12px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.query||''}</td>
    </tr>`).join('') + '</tbody></table>';
}

loadUsers();
loadActivity();
</script>
</body>
</html>
