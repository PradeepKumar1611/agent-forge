<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Forge — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f4fc;color:#2c2640;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(640px 460px at 16% 0%,rgba(124,58,237,.18),transparent 60%),
  radial-gradient(640px 460px at 100% 100%,rgba(236,72,153,.16),transparent 58%)}
.login-card{position:relative;z-index:1;background:#fff;border:1px solid rgba(40,20,80,.10);border-radius:28px;padding:46px 40px;width:420px;max-width:100%;text-align:center;box-shadow:0 30px 80px rgba(80,40,160,.18)}
.logo{width:64px;height:64px;margin:0 auto 18px;border-radius:20px;display:grid;place-items:center;font-size:32px;background:linear-gradient(135deg,#7c3aed,#ec4899);box-shadow:0 12px 30px rgba(124,58,237,.4)}
h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;background:linear-gradient(120deg,#7c3aed,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#74708a;font-size:13px;margin-bottom:32px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:12px;color:#74708a;margin-bottom:7px;font-weight:600}
.form-group input{width:100%;padding:14px 18px;border-radius:14px;border:1px solid rgba(40,20,80,.14);background:#faf9fe;color:#2c2640;font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.form-group input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.12);background:#fff}
.btn{width:100%;padding:14px;border-radius:999px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:transform .18s,box-shadow .18s,opacity .2s;box-shadow:0 10px 26px rgba(124,58,237,.4)}
.btn:hover{transform:translateY(-1px);box-shadow:0 14px 32px rgba(124,58,237,.5)}
.btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none}
.error{color:#fb7185;font-size:13px;margin-top:14px;display:none}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">&#127981;</div>
  <h1>Agent Forge</h1>
  <div class="subtitle">Sign in to design multi-agent systems</div>
  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button class="btn" type="submit" id="loginBtn">Sign In</button>
  </form>
  <div class="error" id="error"></div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: document.getElementById('username').value, password: document.getElementById('password').value})
    });
    const d = await r.json();
    if (r.ok) { window.location.href = '/'; }
    else { err.textContent = d.error || 'Login failed'; err.style.display = 'block'; }
  } catch(ex) { err.textContent = 'Connection error'; err.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Sign In';
}
</script>
</body>
</html>
