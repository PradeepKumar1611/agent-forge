<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Forge — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080910;color:#dbe2f0;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(700px 480px at 18% 0%,rgba(91,140,255,.22),transparent 60%),
  radial-gradient(700px 480px at 100% 100%,rgba(167,139,250,.20),transparent 55%)}
.login-card{position:relative;z-index:1;background:rgba(21,23,42,.7);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border:1px solid rgba(255,255,255,0.1);border-radius:22px;padding:44px 40px;width:400px;max-width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.55)}
.logo{width:62px;height:62px;margin:0 auto 16px;border-radius:18px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#5b8cff,#a78bfa);box-shadow:0 10px 30px rgba(91,140,255,.5)}
h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;background:linear-gradient(120deg,#dce8ff,#c9b8ff 55%,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#8a93ab;font-size:13px;margin-bottom:30px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:12px;color:#8a93ab;margin-bottom:7px;font-weight:600}
.form-group input{width:100%;padding:13px 16px;border-radius:11px;border:1px solid rgba(255,255,255,0.12);background:#171a28;color:#dbe2f0;font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.form-group input:focus{outline:none;border-color:#5b8cff;box-shadow:0 0 0 3px rgba(91,140,255,.15)}
.btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#5b8cff,#a78bfa);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:transform .18s,box-shadow .18s,opacity .2s;box-shadow:0 8px 22px rgba(91,140,255,.45)}
.btn:hover{transform:translateY(-1px);box-shadow:0 11px 28px rgba(91,140,255,.6)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.error{color:#fb7185;font-size:13px;margin-top:14px;display:none}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">&#127981;</div>
  <h1>Agent Forge</h1>
  <div class="subtitle">Sign in to design multi-agent systems</div>
  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button class="btn" type="submit" id="loginBtn">Sign In</button>
  </form>
  <div class="error" id="error"></div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: document.getElementById('username').value, password: document.getElementById('password').value})
    });
    const d = await r.json();
    if (r.ok) { window.location.href = '/'; }
    else { err.textContent = d.error || 'Login failed'; err.style.display = 'block'; }
  } catch(ex) { err.textContent = 'Connection error'; err.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Sign In';
}
</script>
</body>
</html>
